name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CI: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
            artifact_name: vv
          - target: x86_64-w64-mingw32
            os: windows-latest
            archive: zip
            artifact_name: vv.exe
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive: tar.gz
            artifact_name: vv
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
            artifact_name: vv

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            qtbase5-dev \
            libvtk9-dev \
            libvtk9-qt-dev \
            libfmt-dev \
            libcxxopts-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          for pkg in cmake ninja vtk qt fmt cxxopts; do
            brew list --versions "$pkg" >/dev/null || brew install "$pkg"
          done

      - name: Set up MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-vtk
            mingw-w64-x86_64-nlohmann-json

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DVV_ENABLE_WARNINGS=ON \
            -DVV_WARNINGS_AS_ERRORS=ON

      - name: Configure CMake (macOS)
        if: runner.os == 'macOS'
        run: |
          QT_PREFIX="$(brew --prefix qt)"
          VTK_PREFIX="$(brew --prefix vtk)"
          cmake -S . -B build \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DVV_ENABLE_WARNINGS=ON \
            -DVV_WARNINGS_AS_ERRORS=ON \
            -DCMAKE_PREFIX_PATH="$QT_PREFIX;$VTK_PREFIX"

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cmake -S . -B build \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DVV_ENABLE_WARNINGS=ON \
            -DVV_WARNINGS_AS_ERRORS=ON \
            -DCMAKE_PREFIX_PATH="/mingw64"

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build --config Release -j4

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build --config Release -j4

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          tar -czvf "dist/vv-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" -C build ${{ matrix.artifact_name }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $binary = "build/vv.exe"
          if (!(Test-Path $binary)) {
            $binary = "build/Release/vv.exe"
          }
          Compress-Archive -Path $binary -DestinationPath "dist/vv-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vv-${{ matrix.target }}
          path: dist/vv-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
